<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <!-- Ini menghubungkan file CSS kita -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Ini library Chart.js untuk bikin pie chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- HEADER: Judul dan Total Saldo -->
  <header class="app-header">
  <div class="header-top">
    <h1>💰 Budget Tracker</h1>
    <button class="btn-theme" id="themeToggle" onclick="toggleTheme()">
      🌙 Gelap
    </button>
  </div>
  <div class="balance-card">
    <p class="balance-label">Total Pengeluaran</p>
    <p class="balance-amount" id="totalBalance">Rp 0</p>
  </div>
</header>

  <!-- MAIN CONTENT -->
  <main class="app-main">

    <!-- FORM INPUT: Tambah Transaksi -->
    <section class="card">
      <h2>➕ Tambah Transaksi</h2>
      <form id="transactionForm">
        <div class="form-group">
          <label for="itemName">Nama Item</label>
          <input type="text" id="itemName" placeholder="Contoh: Makan Siang" />
        </div>
        <div class="form-group">
          <label for="amount">Jumlah (Rp)</label>
          <input type="number" id="amount" placeholder="Contoh: 25000" min="0" />
        </div>
        <div class="form-group">
          <label for="category">Kategori</label>
          <select id="category">
  <option value="">-- Pilih Kategori --</option>
  <option value="Food">🍔 Makanan</option>
  <option value="Transport">🚗 Transport</option>
  <option value="Fun">🎮 Hiburan</option>
  <option value="Custom">⭐ Lainnya (Custom)</option>
</select>
        </div>
        <!-- Pesan error muncul di sini kalau ada field yang kosong -->
        <p class="error-msg" id="errorMsg"></p>
        <button type="submit" class="btn-primary">Tambah Transaksi</button>
      </form>
    </section>

    <!-- PIE CHART: Visualisasi pengeluaran per kategori -->
    <section class="card">
      <h2>📊 Grafik Pengeluaran</h2>
      <div class="chart-container">
        <canvas id="expenseChart"></canvas>
        <p class="chart-empty" id="chartEmpty">Belum ada data. Tambah transaksi dulu!</p>
      </div>
    </section>

    <!-- DAFTAR TRANSAKSI -->
    <section class="card">
      <h2>📋 Daftar Transaksi</h2>
      <div class="sort-bar">
  <label>Urutkan:</label>
  <select id="sortSelect" onchange="renderTransactions()">
    <option value="newest">Terbaru</option>
    <option value="amount-desc">Jumlah (Terbesar)</option>
    <option value="amount-asc">Jumlah (Terkecil)</option>
    <option value="category">Kategori A-Z</option>
  </select>
</div>
      <div id="transactionList" class="transaction-list">
        <p class="empty-msg">Belum ada transaksi. Yuk tambah!</p>
      </div>
    </section>

  </main>

  <!-- Ini menghubungkan file JavaScript kita — taruh di bawah! -->
  <script src="js/script.js"></script>
</body>
</html>
